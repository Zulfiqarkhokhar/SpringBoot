<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>403 Forbidden</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #ef4444;
        }

        h2 {
            margin: 10px 0;
            font-size: 28px;
        }

        p {
            color: #cbd5f5;
            margin-bottom: 20px;
        }

        a {
            text-decoration: none;
            background: rgb(165, 239, 239);
            color: #000;
            padding: 10px 20px;
            border-radius: 6px;
            transition: 0.3s;
            font-weight: bold;
        }

        a:hover {
            background: #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>403</h1>
    <h2>Forbidden</h2>
    <p>You don’t have permission to access this page.</p>
    <a href="/">Go Back Home</a>
</div>

</body>
</html>
